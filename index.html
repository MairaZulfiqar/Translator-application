<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safa's Translator | Real-time Speech Translator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <meta name="description" content="A premium real-time voice translator between English and Finnish with no latency.">
</head>
<body>
    <div class="bg-glow"></div>
    <div class="container">
        <header>
            <h1>Safa's Translator</h1>
            <p class="subtitle">Real-time Voice Translation</p>
        </header>

        <main>
            <div class="translator-card">
                <div class="video-container">
                    <video id="video-feed" autoplay playsinline muted></video>
                    <div class="video-overlay">LIVE FEED</div>
                </div>
                <div class="controls-top">
                    <div class="selector-group">
                        <label for="source-lang">From</label>
                        <select id="source-lang" class="lang-select">
                            <option value="en-US">English</option>
                            <option value="fi-FI">Finnish</option>
                            <option value="ur-PK">Urdu</option>
                            <option value="fa-IR">Persian</option>
                            <option value="de-DE">German</option>
                            <option value="sv-SE">Swedish</option>
                            <option value="ar-SA">Arabic</option>
                            <option value="zh-CN">Chinese</option>
                        </select>
                    </div>
                    
                    <div class="swap-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m16 3 4 4-4 4"></path><path d="M20 7H4"></path><path d="m8 21-4-4 4-4"></path><path d="M4 17h16"></path></svg>
                    </div>

                    <div class="selector-group">
                        <label for="target-lang">To</label>
                        <select id="target-lang" class="lang-select">
                            <option value="fi-FI">Finnish</option>
                            <option value="en-US">English</option>
                            <option value="ur-PK">Urdu</option>
                            <option value="fa-IR">Persian</option>
                            <option value="de-DE">German</option>
                            <option value="sv-SE">Swedish</option>
                            <option value="ar-SA">Arabic</option>
                            <option value="zh-CN">Chinese</option>
                        </select>
                    </div>
                </div>

                <div class="text-areas">
                    <div class="area-group">
                        <label>Original Speech</label>
                        <div id="original-text" class="text-box" placeholder="Listening...">...</div>
                    </div>
                    <div class="divider"></div>
                    <div class="area-group">
                        <label>Translation</label>
                        <div id="translated-text" class="text-box highlight" placeholder="Translation appears here...">...</div>
                    </div>
                </div>

                <div class="action-bar">
                    <button id="record-btn" class="record-btn">
                        <div class="pulse-ring"></div>
                        <svg class="mic-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                        </svg>
                        <span>Start Listening</span>
                    </button>
                    <p id="status" class="status-msg">Press the button and start speaking</p>
                </div>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 Safa's Translator. Powered by Web Speech API.</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
